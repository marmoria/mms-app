<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Сегодня — Maria OS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:      #1b2a4a;
  --surface: #152238;
  --surface2:#1e3052;
  --card:    #f5f0e8;
  --card2:   #ede8de;
  --border:  #243060;
  --border2: #2e3d70;
  --border-c:rgba(27,42,74,.1);
  --text:    #f0ece4;
  --dim:     #b8bcd0;
  --muted:   #6878a0;
  --on-card: #1b2a4a;
  --on-dim:  #384068;
  --on-muted:#788098;
  --gold:    #c49a52;
  --gold-d:  #9a7230;
  --gold-bg: rgba(196,154,82,.1);
  --crimson: #6b2233;
  --crimson-bg:rgba(107,34,51,.2);
  --green:   #3d7a55;
  --green-bg:rgba(61,122,85,.15);
  --bureau:  #c49a52;
  --aparts:  #3d7a55;
  --personal:#6b4aaa;
  --fs: 'Cormorant Garamond',serif;
  --fm: 'Manrope',sans-serif;
  --nav-h: 72px;
}
html { height:100%; }
body { min-height:100%; background:var(--bg); color:var(--text); font-family:var(--fm); font-weight:300; padding-bottom:var(--nav-h); }

/* ── header ── */
.page-hdr { padding:24px 20px 0; display:flex; align-items:flex-start; justify-content:space-between; }
.page-eyebrow { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:6px; }
.page-title { font-family:var(--fs); font-size:52px; font-weight:300; color:var(--text); line-height:.95; margin-bottom:6px; }
.page-sub { font-family:var(--fs); font-size:15px; font-weight:300; color:var(--muted); font-style:italic; }
.hdr-btn { background:var(--gold-bg); border:1px solid rgba(185,151,91,.25); border-radius:20px; padding:8px 14px; display:flex; align-items:center; gap:6px; color:var(--gold); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-weight:500; cursor:pointer; white-space:nowrap; text-decoration:none; transition:background .15s; flex-shrink:0; margin-top:4px; }
.hdr-btn:hover { background:rgba(185,151,91,.18); }
.hdr-btn svg { width:14px; height:14px; stroke:var(--gold); fill:none; stroke-width:1.8; }
.divider { border:none; border-top:1px solid var(--border); margin:16px 20px; }

/* ── alert card ── */
.alert-card { margin:0 20px 20px; background:var(--crimson-bg); border:1px solid rgba(90,31,45,.3); border-radius:12px; padding:16px 18px; }
.alert-head { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.alert-icon { width:18px; height:18px; flex-shrink:0; }
.alert-icon path { stroke:var(--gold); fill:none; stroke-width:1.8; }
.alert-label { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); font-weight:500; }
.alert-text { font-size:14px; color:var(--dim); line-height:1.6; margin-bottom:10px; }
.alert-link { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:500; text-decoration:none; border-bottom:1px solid rgba(185,151,91,.3); padding-bottom:1px; transition:border-color .15s; }
.alert-link:hover { border-color:var(--gold); }

/* ── section ── */
.sec { padding:0 20px; margin-bottom:20px; }
.sec-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
.sec-title { font-family:var(--fs); font-size:28px; font-weight:300; color:var(--text); }
.sec-action { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:500; cursor:pointer; text-decoration:none; }

/* ── priority tasks ── */
.task-card { background:var(--card); border-radius:12px; padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 8px rgba(0,0,0,.12); transition:background .12s; cursor:pointer; position:relative; overflow:hidden; border:1px solid var(--border-c); }
.task-card:active { background:var(--card2); }
.task-card-accent { position:absolute; left:0; top:0; bottom:0; width:3px; }
.task-num { font-family:var(--fs); font-size:22px; font-weight:300; color:var(--on-muted); min-width:24px; }
.task-body { flex:1; min-width:0; }
.task-title { font-size:14px; color:var(--on-card); font-weight:500; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.task-meta { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--on-muted); }
.task-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.task-check { width:22px; height:22px; border-radius:50%; border:1.5px solid rgba(28,36,64,.2); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.task-check.done { background:var(--green); border-color:var(--green); }
.task-check.done::after { content:''; display:block; width:6px; height:10px; border:2px solid #fff; border-top:none; border-left:none; transform:rotate(45deg) translate(-1px,-1px); }

/* ── habits row ── */
.habits-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
.habits-row::-webkit-scrollbar { display:none; }
.habit-chip { flex-shrink:0; background:var(--card); border-radius:12px; padding:12px 14px; text-align:center; min-width:70px; cursor:pointer; transition:background .12s; border:1px solid var(--border-c); }
.habit-chip:active { background:var(--card2); }
.habit-chip.done { background:rgba(45,106,72,.15); border-color:rgba(45,106,72,.3); }
.habit-chip-icon { width:28px; height:28px; border-radius:50%; background:rgba(28,36,64,.08); margin:0 auto 6px; display:flex; align-items:center; justify-content:center; }
.habit-chip.done .habit-chip-icon { background:var(--green); }
.habit-chip-icon svg { width:14px; height:14px; stroke:var(--on-muted); fill:none; stroke-width:1.8; }
.habit-chip.done .habit-chip-icon svg { stroke:#fff; }
.habit-chip-name { font-size:10px; color:var(--on-muted); font-weight:500; letter-spacing:.3px; }
.habit-chip.done .habit-chip-name { color:var(--green); }

/* ── energy/mood row ── */
.state-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.state-card { background:var(--card); border-radius:12px; padding:14px; text-align:center; border:1px solid var(--border-c); cursor:pointer; }
.state-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--on-muted); margin-bottom:8px; font-weight:500; }
.state-dots { display:flex; justify-content:center; gap:5px; }
.state-dot { width:10px; height:10px; border-radius:50%; background:rgba(28,36,64,.1); border:1px solid rgba(28,36,64,.15); transition:all .1s; cursor:pointer; }
.state-dot.active { background:var(--gold); border-color:var(--gold); }
.state-val { font-family:var(--fs); font-size:22px; font-weight:300; color:var(--on-card); margin-top:6px; }

/* ── schedule strip ── */
.schedule-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid rgba(28,36,64,.08); }
.schedule-time { font-family:var(--fs); font-size:16px; font-weight:300; color:var(--gold-d); min-width:44px; }
.schedule-title { font-size:13px; color:var(--on-card); flex:1; font-weight:400; }
.schedule-dur { font-size:11px; color:var(--on-muted); white-space:nowrap; }

/* ── note ── */
.note-box { background:var(--card); border-radius:12px; padding:14px 16px; border:1px solid var(--border-c); width:100%; min-height:80px; color:var(--on-card); font-family:var(--fm); font-size:13px; font-weight:400; line-height:1.6; resize:none; outline:none; }
.note-box::placeholder { color:var(--on-muted); font-style:italic; }

/* ── bottom nav ── */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; padding:0 8px 8px; z-index:100; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 12px; text-decoration:none; flex:1; }
.nav-item svg { width:22px; height:22px; stroke:var(--muted); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; transition:stroke .15s; }
.nav-item span { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); font-weight:500; transition:color .15s; }
.nav-item.active svg { stroke:var(--gold); }
.nav-item.active span { color:var(--gold); }
.nav-under { width:20px; height:2px; background:var(--gold); border-radius:1px; opacity:0; transition:opacity .15s; }
.nav-item.active .nav-under { opacity:1; }

/* toast */
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(40px); background:var(--card); border-radius:8px; padding:9px 18px; font-size:12px; color:var(--on-card); transition:transform .25s; z-index:200; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.2); opacity:0; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="page-hdr">
  <div>
    <div class="page-eyebrow" id="eyebrow">среда, 29 апреля</div>
    <div class="page-title">Сегодня</div>
    <div class="page-sub" id="daySub">Тихий, осознанный день.</div>
  </div>
  <a class="hdr-btn" href="planner.html">
    <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    План
  </a>
</div>
<hr class="divider">

<!-- ALERT -->
<div class="alert-card" id="alertCard" style="display:none;">
  <div class="alert-head">
    <svg class="alert-icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span class="alert-label" id="alertLabel">Перегруз — умеренный</span>
  </div>
  <div class="alert-text" id="alertText">День плотный — стоит расставить приоритеты.</div>
  <a class="alert-link" href="planner.html">Перепланировать день</a>
</div>

<!-- PRIORITIES -->
<div class="sec">
  <div class="sec-head">
    <div class="sec-title">Три приоритета</div>
    <span class="sec-action" onclick="editTasks()">Фокус</span>
  </div>
  <div id="taskList"></div>
  <div id="addTaskRow" style="display:flex;gap:8px;margin-top:6px;">
    <input id="newTaskInp" placeholder="Добавить задачу..." style="flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:var(--fm);font-size:13px;outline:none;" onkeydown="if(event.key==='Enter')addTask()">
    <button onclick="addTask()" style="background:var(--gold);border:none;border-radius:10px;padding:10px 16px;color:var(--bg);font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600;cursor:pointer;white-space:nowrap;">+</button>
  </div>
</div>

<!-- HABITS -->
<div class="sec">
  <div class="sec-head">
    <div class="sec-title">Привычки</div>
    <span class="sec-action" onclick="manageHabits()">Изменить</span>
  </div>
  <div class="habits-row" id="habitsList"></div>
</div>

<!-- STATE -->
<div class="sec">
  <div class="sec-head"><div class="sec-title">Состояние</div></div>
  <div class="state-row">
    <div class="state-card">
      <div class="state-label">Энергия</div>
      <div class="state-dots" id="dots-energy"></div>
      <div class="state-val" id="val-energy">—</div>
    </div>
    <div class="state-card">
      <div class="state-label">Настроение</div>
      <div class="state-dots" id="dots-mood"></div>
      <div class="state-val" id="val-mood">—</div>
    </div>
    <div class="state-card">
      <div class="state-label">Сон</div>
      <div style="margin-top:4px;">
        <input id="sleepVal" type="number" min="1" max="12" step=".5" placeholder="0" style="width:100%;background:transparent;border:none;outline:none;font-family:var(--fs);font-size:22px;font-weight:300;color:var(--on-card);text-align:center;" onchange="saveSleep()">
      </div>
      <div style="font-size:10px;color:var(--on-muted);margin-top:4px;">часов</div>
    </div>
  </div>
</div>

<!-- NOTE -->
<div class="sec">
  <div class="sec-head"><div class="sec-title">Заметка дня</div></div>
  <textarea class="note-box" id="noteBox" placeholder="Что важно запомнить сегодня..." onblur="saveNote()"></textarea>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item active" href="today.html">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Сегодня</span>
    <div class="nav-under"></div>
  </a>
  <a class="nav-item" href="calendar.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Календарь</span>
    <div class="nav-under"></div>
  </a>
  <a class="nav-item" href="goals.html">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <span>Проекты</span>
    <div class="nav-under"></div>
  </a>
  <a class="nav-item" href="inbox.html">
    <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span>Поток</span>
    <div class="nav-under"></div>
  </a>
  <a class="nav-item" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Я</span>
    <div class="nav-under"></div>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ── date ──────────────────────────────────────────────────────────────
const DAYS   = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const SUBS   = ['Тихий, осознанный день.','Сфокусируйся на главном.','Один шаг за раз.','День начинается с выбора.','Делай что важно.'];

function today() {
  const d = new Date();
  return d.getFullYear()+'_'+d.getMonth()+'_'+d.getDate();
}
function todayKey() { return today(); }

(function initDate() {
  const d = new Date();
  document.getElementById('eyebrow').textContent =
    DAYS[d.getDay()].charAt(0).toUpperCase()+DAYS[d.getDay()].slice(1)+', '+d.getDate()+' '+MONTHS[d.getMonth()];
  document.getElementById('daySub').textContent = SUBS[d.getDay()%SUBS.length];
})();

// ── storage ───────────────────────────────────────────────────────────
function loadDay()  { try { return JSON.parse(localStorage.getItem(todayKey())||'{}'); } catch(e){return{};} }
function saveDay(d) { localStorage.setItem(todayKey(), JSON.stringify(d)); }
function loadH()    { try { return JSON.parse(localStorage.getItem('my_habits')||'[]'); } catch(e){return[];} }

// ── TASKS ─────────────────────────────────────────────────────────────
const PROJECT_COLORS = { bureau:'#b9975b', aparts:'#2d6a48', personal:'#5a4a9a', default:'#6a7898' };

function getTasks() {
  const d = loadDay();
  return d.tasks || [];
}

function renderTasks() {
  const tasks = getTasks();
  const el = document.getElementById('taskList');
  el.innerHTML = '';

  if (!tasks.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--muted);font-style:italic;padding:8px 0 4px;">Добавь задачи дня ниже</div>';
  }

  tasks.forEach((t,i) => {
    const color = PROJECT_COLORS[t.project] || PROJECT_COLORS.default;
    const card = document.createElement('div');
    card.style.cssText = 'margin-bottom:8px;';

    const subs = t.subtasks || [];
    const subsDone = subs.filter(s=>s.done).length;

    card.innerHTML = `
      <div class="task-card" style="padding-right:10px;">
        <div class="task-card-accent" style="background:${color};"></div>
        <div class="task-num">${i+1}</div>
        <div class="task-body">
          <div class="task-title" style="${t.done?'text-decoration:line-through;opacity:.5':''}">${esc(t.text)}</div>
          <div class="task-meta">
            <div class="task-dot" style="background:${color};"></div>
            <span>${t.project||'общее'} · ${t.dur||30} мин</span>
            ${subs.length ? `<span style="margin-left:6px;color:var(--on-muted);">${subsDone}/${subs.length}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:4px;align-items:center;">
          <button onclick="toggleSubtasks('${t.id}')" style="background:none;border:none;color:var(--on-muted);cursor:pointer;font-size:16px;padding:4px;opacity:.5;transition:opacity .15s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5" title="Подзадачи">+</button>
          <button onclick="deleteTask('${t.id}')" style="background:none;border:none;color:var(--on-muted);cursor:pointer;font-size:18px;padding:4px;opacity:.4;transition:opacity .15s;" onmouseover="this.style.opacity=1;this.style.color='#9e4040'" onmouseout="this.style.opacity=.4;this.style.color='var(--on-muted)'" title="Удалить">×</button>
          <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${t.id}')"></div>
        </div>
      </div>
      <div id="subs-${t.id}" style="display:none;margin-left:16px;margin-top:2px;">
        ${subs.map(s=>`
          <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(245,240,232,.06);border-radius:8px;margin-bottom:3px;cursor:pointer;" onclick="toggleSubtask('${t.id}','${s.id}')">
            <div style="width:14px;height:14px;border-radius:50%;border:1.5px solid ${s.done?'var(--green)':'rgba(245,240,232,.3)'};background:${s.done?'var(--green)':'transparent'};flex-shrink:0;"></div>
            <span style="font-size:12px;color:${s.done?'var(--muted)':'var(--dim)'};${s.done?'text-decoration:line-through;':''}">${esc(s.text)}</span>
            <button onclick="event.stopPropagation();deleteSubtask('${t.id}','${s.id}')" style="margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;opacity:.4;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.4">×</button>
          </div>`).join('')}
        <div style="display:flex;gap:6px;margin-top:4px;">
          <input id="sub-inp-${t.id}" placeholder="Добавить подзадачу..." style="flex:1;background:rgba(245,240,232,.06);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;font-family:var(--fm);outline:none;" onkeydown="if(event.key==='Enter')addSubtask('${t.id}')">
          <button onclick="addSubtask('${t.id}')" style="background:var(--gold);border:none;border-radius:8px;padding:7px 12px;color:#1b2a4a;font-size:10px;font-weight:600;cursor:pointer;">+</button>
        </div>
      </div>`;
    el.appendChild(card);
  });

  // Check overload
  const total = tasks.filter(t=>!t.done).reduce((s,t)=>s+(t.dur||30),0);
  const alertCard = document.getElementById('alertCard');
  if (total > 240) {
    alertCard.style.display = '';
    document.getElementById('alertLabel').textContent = 'Перегруз — ' + (total > 360 ? 'высокий' : 'умеренный');
    document.getElementById('alertText').textContent = `Запланировано ${Math.round(total/60*10)/10} ч задач. Рекомендуется перепланировать.`;
  } else {
    alertCard.style.display = 'none';
  }
}

function toggleTask(id) {
  const d = loadDay();
  if (!d.tasks) d.tasks = getTasks();
  const t = d.tasks.find(x=>x.id===id);
  if (t) { t.done = !t.done; saveDay(d); renderTasks(); }
}

function addTask() {
  const inp = document.getElementById('newTaskInp');
  const text = inp.value.trim();
  if (!text) return;
  const d = loadDay();
  if (!d.tasks) d.tasks = getTasks();
  d.tasks.push({ id:'t'+Date.now(), text, project:'default', dur:30, done:false });
  inp.value = '';
  saveDay(d); renderTasks();
  toast('Задача добавлена');
}

function editTasks() { toast('Редактирование задач — скоро'); }

function deleteTask(id) {
  const d = loadDay();
  if (!d.tasks) d.tasks = getTasks();
  d.tasks = d.tasks.filter(x => x.id !== id);
  saveDay(d); renderTasks();
}

function toggleSubtasks(taskId) {
  const el = document.getElementById('subs-' + taskId);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

function addSubtask(taskId) {
  const inp = document.getElementById('sub-inp-' + taskId);
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  const d = loadDay();
  if (!d.tasks) d.tasks = [];
  const t = d.tasks.find(x => x.id === taskId);
  if (!t) return;
  if (!t.subtasks) t.subtasks = [];
  t.subtasks.push({ id: 's' + Date.now(), text, done: false });
  inp.value = '';
  saveDay(d); renderTasks();
  // Re-open subtasks panel
  const el = document.getElementById('subs-' + taskId);
  if (el) el.style.display = '';
}

function toggleSubtask(taskId, subId) {
  const d = loadDay();
  if (!d.tasks) return;
  const t = d.tasks.find(x => x.id === taskId);
  if (!t || !t.subtasks) return;
  const s = t.subtasks.find(x => x.id === subId);
  if (s) { s.done = !s.done; saveDay(d); renderTasks(); }
  const el = document.getElementById('subs-' + taskId);
  if (el) el.style.display = '';
}

function deleteSubtask(taskId, subId) {
  const d = loadDay();
  if (!d.tasks) return;
  const t = d.tasks.find(x => x.id === taskId);
  if (!t || !t.subtasks) return;
  t.subtasks = t.subtasks.filter(x => x.id !== subId);
  saveDay(d); renderTasks();
  const el = document.getElementById('subs-' + taskId);
  if (el) el.style.display = '';
}

// ── HABITS ────────────────────────────────────────────────────────────
const DEFAULT_HABITS = [
  { id:'h1', name:'Вода',     icon:'drop' },
  { id:'h2', name:'Движение', icon:'move' },
  { id:'h3', name:'Чтение',   icon:'book' },
  { id:'h4', name:'Фокус',    icon:'target' },
];

const HABIT_ICONS = {
  drop:  '<circle cx="12" cy="12" r="10"/><path d="M12 2C12 2 6 9 6 13a6 6 0 0012 0c0-4-6-11-6-11z"/>',
  move:  '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>',
  book:  '<path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>',
  target:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
};

function renderHabits() {
  const habits = loadH().length ? loadH() : DEFAULT_HABITS;
  const d = loadDay();
  const el = document.getElementById('habitsList');
  el.innerHTML = '';
  habits.slice(0,6).forEach(h => {
    const done = !!(d.habits && d.habits[h.id]);
    const chip = document.createElement('div');
    chip.className = 'habit-chip' + (done?' done':'');
    chip.innerHTML = `
      <div class="habit-chip-icon">
        <svg viewBox="0 0 24 24">${HABIT_ICONS[h.icon||'target']||HABIT_ICONS.target}</svg>
      </div>
      <div class="habit-chip-name">${esc(h.name)}</div>`;
    chip.onclick = () => toggleHabit(h.id);
    el.appendChild(chip);
  });
}

function toggleHabit(id) {
  const d = loadDay();
  if (!d.habits) d.habits = {};
  d.habits[id] = !d.habits[id];
  saveDay(d); renderHabits();
}

function manageHabits() { toast('Управление привычками — скоро'); }

// ── STATE ─────────────────────────────────────────────────────────────
function renderDots(key, val) {
  const el = document.getElementById('dots-'+key);
  const valEl = document.getElementById('val-'+key);
  el.innerHTML = '';
  for (let i=1;i<=5;i++) {
    const dot = document.createElement('div');
    dot.className = 'state-dot'+(val>=i?' active':'');
    dot.onclick = () => setState(key, i);
    el.appendChild(dot);
  }
  if (valEl) valEl.textContent = val || '—';
}

function setState(key, val) {
  const d = loadDay();
  d[key] = val; saveDay(d);
  renderDots(key, val);
  toast(key === 'energy' ? 'Энергия: '+val : 'Настроение: '+val);
}

function saveSleep() {
  const val = parseFloat(document.getElementById('sleepVal').value);
  if (!isNaN(val)) { const d=loadDay(); d.sleep=val; saveDay(d); }
}

function renderState() {
  const d = loadDay();
  renderDots('energy', d.energy||0);
  renderDots('mood', d.mood||0);
  if (d.sleep) document.getElementById('sleepVal').value = d.sleep;
}

// ── NOTE ──────────────────────────────────────────────────────────────
function renderNote() {
  const d = loadDay();
  const el = document.getElementById('noteBox');
  if (el && d.note) el.value = d.note;
}
function saveNote() {
  const d = loadDay(); d.note = document.getElementById('noteBox').value; saveDay(d);
}

// ── UTILS ─────────────────────────────────────────────────────────────
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

// ── INIT ──────────────────────────────────────────────────────────────
renderTasks();
renderHabits();
renderState();
renderNote();
</script>
