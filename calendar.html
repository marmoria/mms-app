<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Календарь</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
  --bg:       #1b2a4a;
  --surface:  #152238;
  --surface2: #1e3052;
  --card:     #f5f0e8;
  --card2:    #ede8de;
  --border:   #243060;
  --border2:  #2e3d70;
  --border-c: rgba(27,42,74,.1);
  --text:     #f0ece4;
  --dim:      #b8bcd0;
  --muted:    #6878a0;
  --on-card:  #1b2a4a;
  --on-dim:   #384068;
  --on-muted: #788098;
  --gold:     #c49a52;
  --gold-d:   #9a7230;
  --gold-bg:  rgba(196,154,82,.1);
  --crimson:  #6b2233;
  --crimson-bg:rgba(107,34,51,.2);
  --green:    #3d7a55;
  --green-bg: rgba(61,122,85,.15);
  --red:      #9e4040;
  --bureau:   #c49a52;
  --aparts:   #3d7a55;
  --personal: #6b4aaa;
  --font-s:   'Cormorant Garamond', serif;
  --font-m:   'Manrope', sans-serif;
  --r:        10px;
  --nav-h:    72px;
}

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
  padding-bottom: 80px; background: var(--bg); color: var(--text); font-family: var(--font-b,'Manrope',sans-serif); font-size: 16px; min-height: 100vh; }

  /* ── HEADER ── */
  .header { padding: 28px 40px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 20px; }
  .header-nav { display: flex; align-items: center; gap: 16px; }
  .nav-arrow { width: 38px; height: 38px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-dim); transition: all .15s; }
  .nav-arrow:hover { border-color: var(--gold-dim); color: var(--gold); }
  .header-period { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--text); min-width: 260px; }
  .header-period span { color: var(--gold); font-style: italic; }
  .today-btn { padding: 8px 18px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: var(--font-b,'Manrope',sans-serif); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all .15s; }
  .today-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── VIEW SWITCHER ── */
  .view-tabs { display: flex; gap: 1px; background: var(--border); }
  .view-tab { padding: 8px 20px; background: var(--bg); cursor: pointer; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); transition: all .15s; border-bottom: 2px solid transparent; }
  .view-tab:hover { background: var(--surface); color: var(--text-dim); }
  .view-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── LEGEND ── */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .leg-label { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }

  /* ── CONTROLS ROW ── */
  .controls { padding: 12px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

  /* ── WEEK VIEW ── */
  .week-view { display: none; }
  .week-view.active { display: block; }

  .week-header-row { display: grid; grid-template-columns: 52px repeat(7, 1fr); background: var(--border); gap: 1px; border-bottom: 1px solid var(--border); }
  .week-time-gutter { background: var(--bg); }
  .week-day-head { background: var(--bg); padding: 12px 10px; text-align: center; }
  .week-day-name { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .week-day-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--text-dim); line-height: 1.1; margin-top: 2px; }
  .week-day-num.today { color: var(--gold); }

  .week-body { display: grid; grid-template-columns: 52px repeat(7, 1fr); gap: 1px; background: var(--border); overflow-y: auto; max-height: calc(100vh - 200px); }
  .time-col { background: var(--bg); }
  .time-slot { height: 52px; padding: 4px 8px; display: flex; align-items: flex-start; }
  .time-label { font-size: 11px; color: var(--text-muted); }
  .day-col { background: var(--bg); position: relative; }
  .day-col.today-col { background: #C2A66B05; }
  .hour-cell { height: 52px; border-bottom: 1px solid var(--border); position: relative; cursor: pointer; transition: background .1s; }
  .hour-cell:hover { background: var(--surface); }
  .hour-cell.half { border-bottom: 1px dashed #1E2D42; }

  /* ── MONTH VIEW ── */
  .month-view { display: none; }
  .month-view.active { display: block; }

  .month-dow-header { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .dow-cell { background: var(--bg); padding: 10px; text-align: center; font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  .month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .month-cell { background: var(--bg); padding: 10px; min-height: 110px; cursor: pointer; transition: background .15s; position: relative; vertical-align: top; }
  .month-cell:hover { background: var(--surface); }
  .month-cell.other-month { opacity: 0.35; }
  .month-cell.today-cell { background: #C2A66B08; }
  .month-cell.selected { background: var(--surface); outline: 1px solid var(--gold-dim); }
  .month-day-num { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .month-day-num.today-num { color: var(--gold); }
  .month-day-num .habit-bar { height: 3px; width: 28px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .month-day-num .habit-fill { height: 100%; background: var(--gold-dim); border-radius: 2px; }
  .month-events { display: flex; flex-direction: column; gap: 3px; }
  .month-ev { padding: 2px 6px; border-radius: 2px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }

  /* ── QUARTER VIEW ── */
  .quarter-view { display: none; padding: 0; }
  .quarter-view.active { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); }
  .mini-month { background: var(--bg); padding: 20px; }
  .mini-month-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--text-dim); margin-bottom: 12px; }
  .mini-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .mini-dow { font-size: 10px; color: var(--text-muted); text-align: center; padding: 2px 0; letter-spacing: 1px; }
  .mini-day { font-size: 12px; color: var(--text-dim); text-align: center; padding: 4px 2px; border-radius: 2px; cursor: pointer; position: relative; transition: background .1s; min-height: 26px; }
  .mini-day:hover { background: var(--surface); }
  .mini-day.today { color: var(--gold); font-weight: 400; }
  .mini-day.other { opacity: 0.3; }
  .mini-day.has-events::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--gold-dim); }
  .mini-day.selected { background: var(--gold-dim); color: var(--bg); }

  /* ── EVENT DOT ── */
  .ev-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  /* ── EVENT BLOCKS (week/day) ── */
  .event-block { position: absolute; left: 3px; right: 3px; border-radius: 3px; padding: 3px 6px; font-size: 11px; overflow: hidden; cursor: pointer; z-index: 2; transition: opacity .15s; border-left: 3px solid rgba(255,255,255,.3); }
  .event-block:hover { opacity: 0.85; }
  .event-block .ev-title { color: var(--bg); font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-block .ev-time { color: rgba(0,0,0,.5); font-size: 10px; }

  /* ── SIDEBAR / EVENT PANEL ── */
  .main-with-sidebar { display: grid; grid-template-columns: 1fr 300px; gap: 1px; background: var(--border); }
  .cal-main { overflow: hidden; }
  .sidebar { background: var(--bg); overflow-y: auto; }

  .sidebar-block { padding: 20px 22px; border-bottom: 1px solid var(--border); }
  .sidebar-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .selected-date-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: var(--gold); margin-bottom: 4px; }
  .selected-date-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }

  /* add event form */
  .ev-form input, .ev-form select, .ev-form textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    color: var(--text); font-family: var(--font-b,'Manrope',sans-serif); font-size: 13px;
    padding: 9px 12px; outline: none; margin-bottom: 8px; transition: border-color .15s;
  }
  .ev-form input:focus, .ev-form select:focus, .ev-form textarea:focus { border-color: var(--gold-dim); }
  .ev-form input::placeholder, .ev-form textarea::placeholder { color: var(--text-muted); }
  .ev-form textarea { height: 60px; resize: none; font-family: 'Cormorant Garamond', serif; font-size: 15px; }

  .ev-time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ev-allday { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; }
  .ev-allday-check { width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all .15s; flex-shrink: 0; }
  .ev-allday-check.on { background: var(--gold-dim); border-color: var(--gold-dim); color: var(--bg); }
  .ev-allday-label { font-size: 13px; color: var(--text-dim); }

  .type-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; margin-bottom: 10px; }
  .type-chip { padding: 6px 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; cursor: pointer; font-size: 11px; color: var(--text-muted); text-align: center; letter-spacing: .5px; transition: all .15s; }
  .type-chip:hover { background: var(--surface2); }
  .type-chip.active { color: var(--bg); border-color: transparent; }

  .add-ev-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--gold-dim); color: var(--gold); font-family: var(--font-b,'Manrope',sans-serif); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all .2s; }
  .add-ev-btn:hover { background: var(--gold-dim); color: var(--bg); }

  /* event list in sidebar */
  .ev-list-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .ev-list-accent { width: 3px; border-radius: 2px; align-self: stretch; min-height: 32px; flex-shrink: 0; }
  .ev-list-body { flex: 1; min-width: 0; }
  .ev-list-title { font-size: 14px; color: var(--text); margin-bottom: 2px; }
  .ev-list-time { font-size: 12px; color: var(--text-muted); }
  .ev-list-del { cursor: pointer; color: var(--text-muted); font-size: 14px; padding: 2px 4px; transition: color .15s; opacity: 0; }
  .ev-list-item:hover .ev-list-del { opacity: 1; }
  .ev-list-del:hover { color: var(--ev-deadline); }

  /* day note */
  .day-note { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 300; padding: 10px 14px; resize: none; height: 80px; outline: none; line-height: 1.6; transition: border-color .15s; }
  .day-note:focus { border-color: var(--gold-dim); }
  .day-note::placeholder { color: var(--text-muted); font-style: italic; }

/* ── Card fix ── */
.cr, .cr-done { background: var(--card) !important; color: var(--on-card) !important; }
.cr .cr-txt { color: var(--on-card) !important; }
.cr .cr-meta { color: var(--on-muted) !important; }
.modal { background: var(--card) !important; color: var(--on-card) !important; }
.modal-title { color: var(--on-card) !important; }
.modal-body, .modal-foot { color: var(--on-card) !important; }
.f-label { color: var(--on-muted) !important; }
.f-input, .f-select, .f-textarea { background: rgba(27,42,74,.06) !important; border-color: rgba(27,42,74,.15) !important; color: var(--on-card) !important; }
</style>
</head>
<body>


<div class="header">
  <div class="header-nav">
    <div class="nav-arrow" onclick="navigate(-1)">←</div>
    <div class="header-period" id="periodLabel"><span>Март</span> 2026</div>
    <div class="nav-arrow" onclick="navigate(1)">→</div>
    <button class="today-btn" onclick="goToday()">Сегодня</button>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="legend" id="legend"></div>
    <div style="display:flex;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:3px;overflow:hidden;">
      <div class="view-tab active" data-view="month" onclick="switchView('month',this)">Месяц</div>
      <div class="view-tab" data-view="week" onclick="switchView('week',this)">Неделя</div>
      <div class="view-tab" data-view="quarter" onclick="switchView('quarter',this)">3 месяца</div>
    </div>
  </div>
<a href="http://marymoro.ru/core" style="font-size:11px;color:var(--text-muted);text-decoration:none;letter-spacing:1px;opacity:.5;transition:opacity .15s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5">← Главная</a></div>

<div class="main-with-sidebar">
  <div class="cal-main" id="calMain">

    <!-- MONTH VIEW -->
    <div class="month-view active" id="view-month">
      <div class="month-dow-header">
        <div class="dow-cell">Пн</div><div class="dow-cell">Вт</div><div class="dow-cell">Ср</div>
        <div class="dow-cell">Чт</div><div class="dow-cell">Пт</div>
        <div class="dow-cell" style="color:#C47A6A">Сб</div>
        <div class="dow-cell" style="color:#C47A6A">Вс</div>
      </div>
      <div class="month-grid" id="monthGrid"></div>
    </div>

    <!-- WEEK VIEW -->
    <div class="week-view" id="view-week">
      <div class="week-header-row" id="weekHeaderRow">
        <div class="week-time-gutter"></div>
      </div>
      <div class="week-body" id="weekBody">
        <div class="time-col" id="timeCol"></div>
      </div>
    </div>

    <!-- QUARTER VIEW -->
    <div class="quarter-view" id="view-quarter"></div>

  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-block">
      <div class="selected-date-title" id="sidebarDateTitle">Выбери день</div>
      <div class="selected-date-sub" id="sidebarDateSub">нажми на любую дату</div>
      <div id="dayEventsList"></div>
      <div id="sidebarModules"></div>
      <div style="margin-top:12px;">
        <div class="sidebar-label">Заметка дня</div>
        <textarea class="day-note" id="dayNote" placeholder="планы, мысли, напоминания..." oninput="saveDayNote()"></textarea>
      </div>
    </div>

    <div class="sidebar-block">
      <div class="sidebar-label" style="display:flex;justify-content:space-between;align-items:center;">
        Добавить событие
      </div>
      <div class="ev-form">
        <input type="text" id="evTitle" placeholder="название события...">
        <div class="ev-allday" onclick="toggleAllDay()">
          <div class="ev-allday-check" id="allDayCheck">+</div>
          <span class="ev-allday-label">Весь день</span>
        </div>
        <div class="ev-time-row" id="evTimeRow" style="display:none">
          <input type="time" id="evStart" value="10:00">
          <input type="time" id="evEnd" value="11:00">
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div class="sidebar-label" style="margin-bottom:0;">Тип</div>
          <span onclick="toggleManageTypes()" style="font-size:11px;color:var(--text-muted);cursor:pointer;padding:2px 8px;border:1px solid var(--border);border-radius:2px;letter-spacing:1px;transition:all .15s;" onmouseover="this.style.color='var(--gold)';this.style.borderColor='var(--gold)'" onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border)'">Редактировать</span>
        </div>
        <div class="type-grid" id="typeGrid"></div>

        <!-- Manage types panel -->
        <div id="manageTypes" style="display:none;margin-bottom:10px;padding:12px;background:var(--surface);border-radius:3px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">Категории событий</div>
          <div id="typesList" style="margin-bottom:10px;"></div>
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            <input id="newTypeLabel" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;padding:7px 10px;outline:none;" placeholder="название...">
            <input id="newTypeColor" type="color" value="#90AABF" style="width:36px;height:36px;border:1px solid var(--border);border-radius:3px;background:var(--surface2);cursor:pointer;padding:2px;">
          </div>
          <button onclick="addType()" style="width:100%;padding:8px;background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:'Manrope',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;border-radius:3px;transition:all .15s;" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">+ Добавить тип</button>
        </div>

        <textarea id="evNote" placeholder="подробности..."></textarea>
        <button class="add-ev-btn" onclick="addEvent()">+ Добавить</button>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_EV_TYPES = [
  {id:'work',    label:'Бюро',       color:'#d4a96e'},
  {id:'content', label:'Соцсети',    color:'#c06080'},
  {id:'health',  label:'Здоровье',   color:'#c47a8a'},
  {id:'personal',label:'Личное',     color:'#6b8a9e'},
  {id:'home',    label:'Дом',        color:'#7a9e8a'},
  {id:'finance', label:'Финансы',    color:'#6b9e7a'},
  {id:'social',  label:'Люди',       color:'#5a9e9e'},
  {id:'deadline',label:'Дедлайн',    color:'#9e6b6b'},
];

let EV_TYPES = JSON.parse(localStorage.getItem('cal_ev_types') || JSON.stringify(DEFAULT_EV_TYPES));
function saveTypes() { localStorage.setItem('cal_ev_types', JSON.stringify(EV_TYPES)); }

const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const DAYS_RU = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const DAYS_FULL = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];

let events = JSON.parse(localStorage.getItem('cal_events') || '[]');
let dayNotes = JSON.parse(localStorage.getItem('cal_day_notes') || '{}');
let currentView = 'month';
let selectedType = 'work';
let isAllDay = true;
let selectedDate = new Date();
let viewDate = new Date();

const today = new Date();

function dateKey(d) { return `${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`; }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

// ── LEGEND ──
function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '<div class="leg-item"><div style="width:6px;height:6px;border-radius:50%;background:var(--pink,#c47a8a);flex-shrink:0;"></div><span class="leg-label">тело</span></div><div class="leg-item"><div style="width:6px;height:6px;border-radius:50%;background:#6b8a9e;flex-shrink:0;"></div><span class="leg-label">контент</span></div>';
  EV_TYPES.forEach(t => {
    const item = document.createElement('div');
    item.className = 'leg-item';
    item.innerHTML = `<div class="leg-dot" style="background:${t.color}"></div><span class="leg-label">${t.label}</span>`;
    el.appendChild(item);
  });
}

// ── VIEW SWITCH ──
function switchView(v, el) {
  currentView = v;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.month-view,.week-view,.quarter-view').forEach(x => x.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  render();
}

// ── NAVIGATE ──
function navigate(dir) {
  if (currentView === 'month') {
    viewDate.setMonth(viewDate.getMonth() + dir);
  } else if (currentView === 'week') {
    viewDate.setDate(viewDate.getDate() + dir * 7);
  } else if (currentView === 'quarter') {
    viewDate.setMonth(viewDate.getMonth() + dir * 3);
  }
  render();
}

function goToday() { viewDate = new Date(); selectedDate = new Date(); render(); updateSidebar(); }

function render() {
  updatePeriodLabel();
  if (currentView === 'month') renderMonth();
  else if (currentView === 'week') renderWeek();
  else if (currentView === 'quarter') renderQuarter();
}

function updatePeriodLabel() {
  const el = document.getElementById('periodLabel');
  if (currentView === 'month') {
    el.innerHTML = `<span>${MONTHS_RU[viewDate.getMonth()]}</span> ${viewDate.getFullYear()}`;
  } else if (currentView === 'week') {
    const mon = new Date(viewDate);
    mon.setDate(viewDate.getDate() - ((viewDate.getDay()||7)-1));
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    const fmt = d => `${d.getDate()} ${MONTHS_GEN[d.getMonth()]}`;
    el.innerHTML = `<span>${fmt(mon)}</span> — ${fmt(sun)} ${sun.getFullYear()}`;
  } else {
    el.innerHTML = `<span>${MONTHS_RU[viewDate.getMonth()]}</span> — ${MONTHS_RU[(viewDate.getMonth()+2)%12]} ${viewDate.getFullYear()}`;
  }
}

// ── MONTH RENDER ──
function renderMonth() {
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const first = new Date(year, month, 1);
  const last  = new Date(year, month+1, 0);
  let startDow = first.getDay(); startDow = startDow===0?6:startDow-1;

  // prev month padding
  for (let i=0; i<startDow; i++) {
    const d = new Date(year, month, -startDow+i+1);
    grid.appendChild(makeMonthCell(d, true));
  }
  // days
  for (let d=1; d<=last.getDate(); d++) {
    grid.appendChild(makeMonthCell(new Date(year,month,d), false));
  }
  // next month padding
  const total = startDow + last.getDate();
  const rem = total%7 === 0 ? 0 : 7-(total%7);
  for (let i=1; i<=rem; i++) {
    grid.appendChild(makeMonthCell(new Date(year,month+1,i), true));
  }
}

function makeMonthCell(date, otherMonth) {
  const cell = document.createElement('div');
  const isToday = sameDay(date, today);
  const isSelected = sameDay(date, selectedDate);
  cell.className = 'month-cell' + (otherMonth?' other-month':'') + (isToday?' today-cell':'') + (isSelected?' selected':'');

  const dayEvs = getEventsForDay(date);
  const habitData = getHabitDataForDay(date);

  const habitHtml = habitData !== null
    ? '<div class="habit-bar"><div class="habit-fill" style="width:'+habitData+'%"></div></div>'
    : '';
  const evHtml = dayEvs.slice(0,3).map(e => {
    const t = EV_TYPES.find(x=>x.id===e.type)||EV_TYPES[0];
    return '<div class="month-ev" style="background:'+t.color+'22;color:'+t.color+';border-left:2px solid '+t.color+'" title="'+e.title+'">'+(e.allDay?'':e.start+' ')+e.title+'</div>';
  }).join('');
  const moreHtml = dayEvs.length>3 ? '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">+'+( dayEvs.length-3)+' ещё</div>' : '';
  // cross-module markers
  const bodyMarker = getBodyMarkerForDay(date);
  const contentMarker = getContentMarkerForDay(date);
  const markerHtml = (bodyMarker||contentMarker)
    ? '<div style="display:flex;gap:2px;margin-top:2px;">'
      + (bodyMarker ? '<div style="width:5px;height:5px;border-radius:50%;background:var(--pink);flex-shrink:0;" title="Тело записано"></div>' : '')
      + (contentMarker ? '<div style="width:5px;height:5px;border-radius:50%;background:var(--blue,#6b8a9e);flex-shrink:0;" title="Контент запланирован"></div>' : '')
      + '</div>'
    : '';

  cell.innerHTML =
    '<div class="month-day-num'+(isToday?' today-num':'')+'"><span>'+date.getDate()+'</span>'+habitHtml+'</div>'
    + markerHtml
    + '<div class="month-events">'+evHtml+moreHtml+'</div>';
  cell.onclick = () => selectDate(date);
  return cell;
}

function getEventsForDay(date) {
  const k = dateKey(date);
  return events.filter(e => e.dateKey === k).sort((a,b) => (a.start||'').localeCompare(b.start||''));
}

function getHabitDataForDay(date) {
  const k = `day_${date.getFullYear()}_${date.getMonth()}_${date.getDate()}`;
  const sv = localStorage.getItem(k);
  if (!sv) return null;
  const s = JSON.parse(sv);
  const vals = Object.values(s.habits||{});
  if (!vals.length) return null;
  return Math.round((vals.filter(Boolean).length / vals.length) * 100);
}


function getBodyMarkerForDay(date) {
  try {
    const k = `body_${date.getFullYear()}_${date.getMonth()}_${date.getDate()}`;
    const sv = localStorage.getItem(k);
    if (!sv) return false;
    const s = JSON.parse(sv);
    return !!(s.weight || s.sleepTime);
  } catch(e) { return false; }
}

function getContentMarkerForDay(date) {
  try {
    const weeks = JSON.parse(localStorage.getItem('cc2_weeks') || '[]');
    const dd = String(date.getDate()).padStart(2,'0');
    const mm = String(date.getMonth()+1).padStart(2,'0');
    const dateStr = `${dd}.${mm}`;
    return weeks.some(wk =>
      (wk.days||[]).some(day =>
        day.date && day.date.startsWith(dateStr) &&
        (day.personal || day.bureau || day.aparts)
      )
    );
  } catch(e) { return false; }
}

// ── WEEK RENDER ──
function renderWeek() {
  const mon = new Date(viewDate);
  mon.setDate(viewDate.getDate() - ((viewDate.getDay()||7)-1));

  // header
  const hRow = document.getElementById('weekHeaderRow');
  hRow.innerHTML = '<div class="week-time-gutter"></div>';
  for (let i=0; i<7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const isToday = sameDay(d, today);
    const head = document.createElement('div');
    head.className = 'week-day-head';
    head.innerHTML = `<div class="week-day-name">${DAYS_RU[d.getDay()]}</div><div class="week-day-num${isToday?' today':''}>${d.getDate()}</div>`;
    hRow.appendChild(head);
  }

  // body
  const body = document.getElementById('weekBody');
  body.innerHTML = '';

  // time gutter
  const timeCol = document.createElement('div');
  timeCol.className = 'time-col';
  for (let h=7; h<23; h++) {
    const slot = document.createElement('div');
    slot.className = 'time-slot';
    slot.style.height = '52px';
    slot.innerHTML = `<span class="time-label">${String(h).padStart(2,'0')}:00</span>`;
    timeCol.appendChild(slot);
  }
  body.appendChild(timeCol);

  // day columns
  for (let i=0; i<7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const isToday = sameDay(d, today);
    const col = document.createElement('div');
    col.className = 'day-col' + (isToday?' today-col':'');

    // hour cells
    for (let h=7; h<23; h++) {
      const cell = document.createElement('div');
      cell.className = 'hour-cell';
      cell.onclick = () => { selectDate(d); document.getElementById('evStart').value=`${String(h).padStart(2,'0')}:00`; };
      col.appendChild(cell);
    }

    // event blocks
    const dayEvs = getEventsForDay(d).filter(e => !e.allDay && e.start);
    dayEvs.forEach(e => {
      const t = EV_TYPES.find(x=>x.id===e.type)||EV_TYPES[0];
      const [sh,sm] = e.start.split(':').map(Number);
      const [eh,em] = (e.end||e.start).split(':').map(Number);
      const top = (sh - 7) * 52 + (sm/60)*52;
      const height = Math.max(26, ((eh*60+em)-(sh*60+sm))/60*52);
      const block = document.createElement('div');
      block.className = 'event-block';
      block.style.cssText = `top:${top}px;height:${height}px;background:${t.color};`;
      block.innerHTML = `<div class="ev-title">${e.title}</div><div class="ev-time">${e.start}${e.end?'–'+e.end:''}</div>`;
      block.onclick = e2 => { e2.stopPropagation(); };
      col.appendChild(block);
    });

    body.appendChild(col);
  }
}

// ── QUARTER RENDER ──
function renderQuarter() {
  const el = document.getElementById('view-quarter');
  el.innerHTML = '';
  for (let m=0; m<3; m++) {
    const d = new Date(viewDate.getFullYear(), viewDate.getMonth()+m, 1);
    el.appendChild(makeMiniMonth(d));
  }
}

function makeMiniMonth(monthDate) {
  const wrap = document.createElement('div');
  wrap.className = 'mini-month';
  wrap.innerHTML = `<div class="mini-month-title">${MONTHS_RU[monthDate.getMonth()]} <span style="color:var(--text-muted);font-size:16px;">${monthDate.getFullYear()}</span></div>`;

  const grid = document.createElement('div');
  grid.className = 'mini-grid';
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => {
    const cell = document.createElement('div'); cell.className='mini-dow'; cell.textContent=d; grid.appendChild(cell);
  });

  const year = monthDate.getFullYear(), month = monthDate.getMonth();
  const first = new Date(year,month,1), last = new Date(year,month+1,0);
  let startDow = first.getDay(); startDow = startDow===0?6:startDow-1;
  for (let i=0;i<startDow;i++) { const c=document.createElement('div');c.className='mini-day other';c.textContent=new Date(year,month,-startDow+i+1).getDate();grid.appendChild(c); }
  for (let d=1;d<=last.getDate();d++) {
    const date = new Date(year,month,d);
    const isToday = sameDay(date,today);
    const isSel = sameDay(date,selectedDate);
    const hasEv = getEventsForDay(date).length > 0;
    const c = document.createElement('div');
    c.className = 'mini-day'+(isToday?' today':'')+(isSel?' selected':'')+(hasEv?' has-events':'');
    c.textContent = d;
    c.onclick = () => selectDate(date);
    grid.appendChild(c);
  }
  wrap.appendChild(grid);
  return wrap;
}

// ── SELECT DATE ──
function selectDate(date) {
  selectedDate = date;
  updateSidebar();
  render();
}

function renderSidebarModules(date) {
  // Body data for selected day
  try {
    const k = `body_${date.getFullYear()}_${date.getMonth()}_${date.getDate()}`;
    const sv = localStorage.getItem(k);
    const modEl = document.getElementById('sidebarModules');
    if (!modEl) return;
    modEl.innerHTML = '';
    if (sv) {
      const s = JSON.parse(sv);
      const sleep = s.sleepTime && s.wakeTime ? (() => {
        const [sh,sm]=s.sleepTime.split(':').map(Number),[wh,wm]=s.wakeTime.split(':').map(Number);
        let m=(wh*60+wm)-(sh*60+sm); if(m<0)m+=1440; return (m/60).toFixed(1);
      })() : null;
      const items = [];
      if (sleep) items.push(`сон ${sleep}ч`);
      if (s.weight) items.push(`вес ${s.weight}кг`);
      if (s.kkal) items.push(`${s.kkal} ккал`);
      if (s.water) items.push(`вода ${s.water}л`);
      if (items.length) {
        modEl.innerHTML += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;">${items.map(i=>`<span style="font-size:10px;padding:2px 7px;background:var(--surface2);border-radius:2px;color:var(--text-muted);letter-spacing:1px;">${i}</span>`).join('')}</div>`;
      }
    }
    // Content posts for selected day
    try {
      const weeks = JSON.parse(localStorage.getItem('cc2_weeks') || '[]');
      const dd = String(date.getDate()).padStart(2,'0');
      const mm = String(date.getMonth()+1).padStart(2,'0');
      const dateStr = `${dd}.${mm}`;
      const posts = [];
      weeks.forEach(wk => (wk.days||[]).forEach(day => {
        if (!day.date || !day.date.startsWith(dateStr)) return;
        ['personal','bureau','aparts'].forEach(a => { if(day[a]&&day[a].text) posts.push({acc:a,text:day[a].text.split('\n')[0]}); });
      }));
      if (posts.length) {
        const ACC={personal:'Личный',bureau:'Бюро',aparts:'Апарты'};
        modEl.innerHTML += `<div style="margin-top:8px;display:flex;flex-direction:column;gap:2px;">${posts.map(p=>`<div style="font-size:11px;padding:4px 7px;background:var(--surface2);border-left:2px solid var(--steel,#6b8a9e);border-radius:0 2px 2px 0;color:var(--text-dim);"><span style="font-size:9px;color:var(--steel,#6b8a9e);letter-spacing:1px;text-transform:uppercase;margin-right:5px;">${ACC[p.acc]||p.acc}</span>${p.text.slice(0,50)}${p.text.length>50?'…':''}</div>`).join('')}</div>`;
      }
    } catch(e) {}
  } catch(e) {}
}

function updateSidebar() {
  const d = selectedDate;
  const isToday = sameDay(d, today);
  document.getElementById('sidebarDateTitle').textContent =
    `${d.getDate()} ${MONTHS_GEN[d.getMonth()]}${d.getFullYear()!==today.getFullYear()?' '+d.getFullYear():''}`;
  document.getElementById('sidebarDateSub').textContent =
    DAYS_FULL[d.getDay()] + (isToday?' · сегодня':'');

  // events list
  const list = document.getElementById('dayEventsList');
  list.innerHTML = '';
  const dayEvs = getEventsForDay(d);
  if (!dayEvs.length) {
    list.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;font-style:italic;font-family:Cormorant Garamond,serif;">Нет событий</div>';
  } else {
    dayEvs.forEach(e => {
      const t = EV_TYPES.find(x=>x.id===e.type)||EV_TYPES[0];
      const item = document.createElement('div');
      item.className = 'ev-list-item';
      item.innerHTML = '<div class="ev-list-accent" style="background:'+t.color+'"></div>'
      + '<div class="ev-list-body">'
      + '<div class="ev-list-title">'+e.title+'</div>'
      + '<div class="ev-list-time">'+(e.allDay?'Весь день':e.start+(e.end?'–'+e.end:''))+' · '+t.label+'</div>'
      + (e.note ? '<div style="font-size:12px;color:var(--text-muted);margin-top:3px;">'+e.note+'</div>' : '')
      + '</div>'
      + '<div class="ev-list-del" onclick="deleteEvent('+e.id+')">×</div>';
      list.appendChild(item);
    });
  }

  // day note
  const noteEl = document.getElementById('dayNote');
  noteEl.value = dayNotes[dateKey(d)] || '';
  renderSidebarModules(d);
}

// ── ADD / DELETE EVENT ──
function addEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) return;
  const ev = {
    id: Date.now(),
    title,
    type: selectedType,
    dateKey: dateKey(selectedDate),
    allDay: isAllDay,
    start: isAllDay ? null : document.getElementById('evStart').value,
    end: isAllDay ? null : document.getElementById('evEnd').value,
    note: document.getElementById('evNote').value.trim(),
  };
  events.push(ev);
  saveEvents();
  document.getElementById('evTitle').value = '';
  document.getElementById('evNote').value = '';
  updateSidebar();
  render();
}

function deleteEvent(id) {
  events = events.filter(e => e.id !== id);
  saveEvents();
  updateSidebar();
  render();
}

function saveEvents() { localStorage.setItem('cal_events', JSON.stringify(events)); }

function saveDayNote() {
  dayNotes[dateKey(selectedDate)] = document.getElementById('dayNote').value;
  localStorage.setItem('cal_day_notes', JSON.stringify(dayNotes));
}

// ── TYPE GRID ──
function renderTypeGrid() {
  const grid = document.getElementById('typeGrid');
  grid.innerHTML = '';
  EV_TYPES.forEach(t => {
    const chip = document.createElement('div');
    chip.className = 'type-chip' + (t.id===selectedType?' active':'');
    if (t.id===selectedType) { chip.style.background = t.color; chip.style.borderColor = t.color; }
    chip.textContent = t.label;
    chip.onclick = () => { selectedType=t.id; renderTypeGrid(); };
    grid.appendChild(chip);
  });
  // if selectedType no longer exists, reset
  if (!EV_TYPES.find(t=>t.id===selectedType) && EV_TYPES.length) selectedType = EV_TYPES[0].id;
}

function renderTypesList() {
  const el = document.getElementById('typesList'); if (!el) return;
  el.innerHTML = '';
  EV_TYPES.forEach((t,i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);';
    const isDefault = DEFAULT_EV_TYPES.find(d => d.id === t.id);
    const delSpan = isDefault ? '' : '<span style="cursor:pointer;color:var(--text-muted);font-size:13px;padding:2px 6px;" onclick="deleteType(\'' + t.id + '\')">×</span>';
    row.innerHTML = '<div style="width:12px;height:12px;border-radius:50%;background:' + t.color + ';flex-shrink:0;"></div>'
      + '<span style="flex:1;font-size:13px;color:var(--text-dim);">' + t.label + '</span>'
      + delSpan;
    el.appendChild(row);
  });
}

function toggleManageTypes() {
  const p = document.getElementById('manageTypes');
  const open = p.style.display === 'none';
  p.style.display = open ? 'block' : 'none';
  if (open) renderTypesList();
}

function addType() {
  const label = document.getElementById('newTypeLabel').value.trim();
  const color = document.getElementById('newTypeColor').value;
  if (!label) return;
  const id = 'ct_' + Date.now();
  EV_TYPES.push({id, label, color});
  saveTypes();
  document.getElementById('newTypeLabel').value = '';
  renderTypeGrid(); renderTypesList(); renderLegend();
}

function deleteType(id) {
  EV_TYPES = EV_TYPES.filter(t => t.id !== id);
  saveTypes();
  if (selectedType === id && EV_TYPES.length) selectedType = EV_TYPES[0].id;
  renderTypeGrid(); renderTypesList(); renderLegend();
}

// ── ALL DAY TOGGLE ──
function toggleAllDay() {
  isAllDay = !isAllDay;
  document.getElementById('allDayCheck').className = 'ev-allday-check'+(isAllDay?' on':'');
  document.getElementById('allDayCheck').textContent = isAllDay?'+':'';
  document.getElementById('evTimeRow').style.display = isAllDay?'none':'grid';
}

// ── INIT ──
renderLegend();
renderTypeGrid();
viewDate = new Date();
selectedDate = new Date();
render();
updateSidebar();

// scroll week view to 8am
setTimeout(() => {
  const wb = document.getElementById('weekBody');
  if (wb) wb.scrollTop = 52;
}, 100);
</script>
